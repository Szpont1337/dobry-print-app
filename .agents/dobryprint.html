document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ight:700;font-size:12.5px;cursor:pointer;\" style-hover=\"border-color:#0E6A57;color:#0E6A57;\">Zamów ponownie<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ tabData }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"background:#fff;border:1px solid #E5E8E5;border-radius:18px;padding:28px;max-width:620px;\">\n      <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;color:#14241F;margin-bottom:18px;\">Dane firmy<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;\">\n        <div><div style=\"font-size:12.5px;color:#7A8884;margin-bottom:5px;\">Nazwa<\u002Fdiv><div style=\"font-weight:600;color:#14241F;\">Kowalski Studio sp. z o.o.<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:12.5px;color:#7A8884;margin-bottom:5px;\">NIP<\u002Fdiv><div style=\"font-weight:600;color:#14241F;\">521-100-20-30<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:12.5px;color:#7A8884;margin-bottom:5px;\">E-mail<\u002Fdiv><div style=\"font-weight:600;color:#14241F;\">jan@firma.pl<\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:12.5px;color:#7A8884;margin-bottom:5px;\">Telefon<\u002Fdiv><div style=\"font-weight:600;color:#14241F;\">+48 600 100 200<\u002Fdiv><\u002Fdiv>\n        <div style=\"grid-column:span 2;\"><div style=\"font-size:12.5px;color:#7A8884;margin-bottom:5px;\">Adres<\u002Fdiv><div style=\"font-weight:600;color:#14241F;\">ul. Przykładowa 12/3, 00-001 Warszawa<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:22px;display:inline-block;padding:12px 22px;border-radius:11px;background:#0E6A57;color:#fff;font-weight:700;cursor:pointer;\" style-hover=\"background:#0A4E40;\">Edytuj dane<\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    cat: 'wiz',\n    // config selections\n    format: 0, paper: 0, sides: 0, finish: 0, corners: 0, qtyIdx: 2, design: 0, uploaded: false,\n    justAdded: false,\n    cart: [],\n    // checkout\n    pay: 0, orderDone: false, lastOrderId: '',\n    fEmail: '', fName: '', fPhone: '', fStreet: '', fZip: '', fCity: '',\n    accountTab: 'orders', showIdx: 0, entered: true\n  };\n\n  // ----- catalog -----\n  CATS = {\n    wiz:   { name:'Wizytówki', from:55 },\n    ulot:  { name:'Ulotki i foldery', from:79 },\n    plak:  { name:'Plakaty', from:39 },\n    baner: { name:'Banery i roll-upy', from:89 },\n    nakl:  { name:'Naklejki', from:45 },\n    piecz: { name:'Pieczątki', from:65 },\n    gadz:  { name:'Materiały reklamowe', from:120 },\n  };\n\n  catObj(){ return this.CATS[this.state.cat] || this.CATS.wiz; }\n\n  // ----- pricing -----\n  FORMATS = [\n    {name:'90 × 50 mm', note:'standard', m:1},\n    {name:'85 × 55 mm', note:'klasyczny', m:1},\n    {name:'Kwadrat 55 × 55', note:'+20%', m:1.2},\n  ];\n  PAPERS = [\n    {name:'Kreda 350 g', note:'mat/błysk', m:1},\n    {name:'Kreda 400 g', note:'+18%', m:1.18},\n    {name:'Ozdobny 300 g', note:'+40%', m:1.4},\n  ];\n  SIDES = [ {name:'Jednostronne', note:'4/0', m:1}, {name:'Dwustronne', note:'4/4', m:1.35} ];\n  FINISH = [\n    {name:'Bez uszlachetnień', note:null, m:1, gloss:false},\n    {name:'Folia mat', note:'+25%', m:1.25, gloss:false},\n    {name:'Folia błysk', note:'+25%', m:1.25, gloss:true},\n    {name:'Lakier UV 3D', note:'+50%', m:1.5, gloss:true},\n  ];\n  CORNERS = [ {name:'Proste rogi', note:null, m:0}, {name:'Zaokrąglone', note:'+0,05/szt', m:0.05} ];\n  QTY = [\n    {q:100, unit:0.55}, {q:250, unit:0.30}, {q:500, unit:0.198}, {q:1000, unit:0.139}, {q:2500, unit:0.099},\n  ];\n  DESIGNS = [\n    {name:'Mam gotowy plik', note:'PDF / AI / JPG', add:0},\n    {name:'Projekt graficzny', note:'+49 zł, gotowy w 24 h', add:49},\n  ];\n\n  calc(){\n    const s = this.state;\n    const q = this.QTY[s.qtyIdx];\n    const fmt = this.FORMATS[s.format].m;\n    const pap = this.PAPERS[s.paper].m;\n    const sid = this.SIDES[s.sides].m;\n    const fin = this.FINISH[s.finish].m;\n    const cor = this.CORNERS[s.corners].m;\n    const des = this.DESIGNS[s.design].add;\n    let net = q.q * q.unit * fmt * pap * sid * fin;\n    net += q.q * cor;\n    net += des;\n    net = Math.round(net);\n    return { net, gross: Math.round(net*1.23), per:(net/q.q).toFixed(2).replace('.',','), qty:q.q };\n  }\n\n  fmtZl(n){ return Number(n).toLocaleString('pl-PL'); }\n\n  shipDate(){\n    const d = new Date(2026,5,30); // 30 czerwca 2026\n    return d.toLocaleDateString('pl-PL',{day:'numeric',month:'long'});\n  }\n\n  optBtn(active){\n    return active\n      ? { border:'#0E6A57', bg:'#E7F1ED', fg:'#0A4E40', noteFg:'#0E6A57' }\n      : { border:'#DCE0DD', bg:'#fff', fg:'#14241F', noteFg:'#7A8884' };\n  }\n\n  // ---- stable refs (so they don't remount each render) ----\n  refProducts = (el)=>{ this.productsEl = el; };\n  refCardLayer = (el)=>{ this.cardLayerEl = el; };\n  refHeroCanvas = (el)=>{\n    if(el){ if(el!==this._glEl){ this._glEl=el; this.initGL(el); } }\n    else { this._glEl=null; this.teardownGL(); }\n  };\n  refScene = (el)=>{\n    if(!el || el===this.sceneEl) return;\n    this.sceneEl = el;\n    const clamp=(v)=>Math.max(0,Math.min(1,v));\n    el.addEventListener('mousemove',(e)=>{\n      const r=el.getBoundingClientRect();\n      const x=(e.clientX-r.left)/r.width, y=(e.clientY-r.top)/r.height;\n      this.mouseTarget=[clamp(x),clamp(1-y)];\n      const mx=x-0.5, my=y-0.5;\n      if(this.cardLayerEl) this.cardLayerEl.style.transform='rotateX('+(14-my*12)+'deg) rotateY('+(-16+mx*16)+'deg) translateX('+(mx*12)+'px)';\n    });\n    el.addEventListener('mouseleave',()=>{\n      this.mouseTarget=[0.5,0.55];\n      if(this.cardLayerEl) this.cardLayerEl.style.transform='rotateX(14deg) rotateY(-16deg)';\n    });\n  };\n\n  componentDidMount(){\n    this.showTimer = setInterval(()=>{\n      if(this.state.screen!=='home') return;\n      this.setState(s=>({showIdx:(s.showIdx+1)%4, entered:false}));\n      setTimeout(()=>this.setState({entered:true}), 40);\n    }, 2600);\n  }\n  componentWillUnmount(){ clearInterval(this.showTimer); this.teardownGL(); }\n\n  teardownGL(){\n    if(this.raf) cancelAnimationFrame(this.raf);\n    this.raf=null;\n    if(this._resize){ window.removeEventListener('resize',this._resize); this._resize=null; }\n    this.gl=null;\n  }\n\n  initGL(canvas){\n    this.teardownGL();\n    let gl=null;\n    try{ gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl'); }catch(e){}\n    if(!gl){ canvas.style.background='radial-gradient(120% 120% at 80% 8%,#0E6A57,#073A2F)'; return; }\n    this.gl=gl;\n    const VS='attribute vec2 a_pos; void main(){ gl_Position=vec4(a_pos,0.0,1.0); }';\n    const FS=[\n      'precision highp float;',\n      'uniform vec2 u_res; uniform float u_time; uniform vec2 u_mouse;',\n      'float hash(vec2 p){ p=fract(p*vec2(123.34,345.45)); p+=dot(p,p+34.345); return fract(p.x*p.y); }',\n      'float vnoise(vec2 p){ vec2 i=floor(p),f=fract(p); vec2 u=f*f*(3.0-2.0*f);',\n      ' float a=hash(i),b=hash(i+vec2(1.0,0.0)),c=hash(i+vec2(0.0,1.0)),d=hash(i+vec2(1.0,1.0));',\n      ' return mix(mix(a,b,u.x),mix(c,d,u.x),u.y); }',\n      'float fbm(vec2 p){ float v=0.0,a=0.5; mat2 m=mat2(1.6,1.2,-1.2,1.6);',\n      ' for(int i=0;i<5;i++){ v+=a*vnoise(p); p=m*p; a*=0.5; } return v; }',\n      'float dotCov(vec2 p,float ang,float v,float f,float aa){',\n      ' float s=sin(ang),c=cos(ang); mat2 R=mat2(c,-s,s,c);',\n      ' vec2 g=fract(R*p*f)-0.5; float dist=length(g);',\n      ' float r=sqrt(clamp(v,0.0,1.0))*0.47; return smoothstep(r+aa,r-aa,dist); }',\n      'void main(){',\n      ' vec2 res=u_res; vec2 uv=gl_FragCoord.xy/res; float aspect=res.x/res.y;',\n      ' vec2 p=vec2(uv.x*aspect,uv.y); vec2 m=vec2(u_mouse.x*aspect,u_mouse.y); float t=u_time;',\n      ' vec2 q=p*1.7;',\n      ' float warp=fbm(q*0.8+vec2(t*0.05,-t*0.04));',\n      ' float field=fbm(q+warp*1.2+vec2(-t*0.03,t*0.05));',\n      ' float dm=distance(p,m);',\n      ' field+=0.45*exp(-dm*3.5);',\n      ' field+=0.10*sin(dm*22.0-t*2.2)*exp(-dm*2.5);',\n      ' field=clamp(field,0.0,1.0);',\n      ' float ink=smoothstep(0.34,0.92,field);',\n      ' float hue=fbm(q*0.7+vec2(9.3,-4.1));',\n      ' vec3 green=vec3(0.05,0.42,0.34); vec3 amber=vec3(0.93,0.66,0.22);',\n      ' vec3 target=mix(green,amber,smoothstep(0.56,0.86,hue));',\n      ' float k=1.0-max(target.r,max(target.g,target.b));',\n      ' vec3 cmy=(vec3(1.0)-target-vec3(k))/max(1.0-k,0.001); cmy=clamp(cmy,0.0,1.0);',\n      ' float f=44.0; float aa=f/res.y*1.7;',\n      ' float fC=dotCov(p,0.2618,cmy.x*ink,f,aa);',\n      ' float fM=dotCov(p,1.3090,cmy.y*ink,f,aa);',\n      ' float fY=dotCov(p,0.0,cmy.z*ink,f,aa);',\n      ' float fK=dotCov(p,0.7854,k*ink*0.9,f,aa);',\n      ' vec3 col=vec3(0.03,0.16,0.13);',\n      ' col+=vec3(0.05,0.72,0.66)*fC*0.95;',\n      ' col+=vec3(0.95,0.22,0.52)*fM*0.8;',\n      ' col+=vec3(1.0,0.84,0.16)*fY*0.8;',\n      ' col*=(1.0-0.5*fK);',\n      ' float vig=smoothstep(1.3,0.25,length((uv-0.5)*vec2(aspect,1.0)));',\n      ' col*=mix(0.72,1.02,vig);',\n      ' gl_FragColor=vec4(col,1.0);',\n      '}'\n    ].join('\\n');\n    const mk=(ty,src)=>{ const sh=gl.createShader(ty); gl.shaderSource(sh,src); gl.compileShader(sh); if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)) console.warn('GL shader:', gl.getShaderInfoLog(sh)); return sh; };\n    const prog=gl.createProgram();\n    gl.attachShader(prog,mk(gl.VERTEX_SHADER,VS));\n    gl.attachShader(prog,mk(gl.FRAGMENT_SHADER,FS));\n    gl.linkProgram(prog);\n    if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){ console.warn('GL link:', gl.getProgramInfoLog(prog)); }\n    gl.useProgram(prog);\n    const buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf);\n    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);\n    const loc=gl.getAttribLocation(prog,'a_pos'); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);\n    const uRes=gl.getUniformLocation(prog,'u_res'), uTime=gl.getUniformLocation(prog,'u_time'), uMouse=gl.getUniformLocation(prog,'u_mouse');\n    if(!this.mouse){ this.mouse=[0.5,0.55]; this.mouseTarget=[0.5,0.55]; }\n    const resize=()=>{ const dpr=Math.min(window.devicePixelRatio||1,2); const w=canvas.clientWidth||600,h=canvas.clientHeight||460; canvas.width=Math.max(2,Math.round(w*dpr)); canvas.height=Math.max(2,Math.round(h*dpr)); gl.viewport(0,0,canvas.width,canvas.height); };\n    this._resize=resize; window.addEventListener('resize',resize); resize();\n    const t0=performance.now();\n    const loop=(now)=>{\n      if(this.gl!==gl) return;\n      this.mouse[0]+=(this.mouseTarget[0]-this.mouse[0])*0.07;\n      this.mouse[1]+=(this.mouseTarget[1]-this.mouse[1])*0.07;\n      gl.uniform2f(uRes,canvas.width,canvas.height);\n      gl.uniform1f(uTime,(now-t0)/1000);\n      gl.uniform2f(uMouse,this.mouse[0],this.mouse[1]);\n      gl.drawArrays(gl.TRIANGLES,0,3);\n      this.raf=requestAnimationFrame(loop);\n    };\n    this.raf=requestAnimationFrame(loop);\n  }\n\n  renderVals(){\n    const s = this.state;\n    const set = (k,v)=>()=>this.setState({[k]:v, justAdded:false});\n    const price = this.calc();\n    const cat = this.catObj();\n\n    // cart computed\n    const cartNet = s.cart.reduce((a,c)=>a+c.priceNet,0);\n    const shipCost = s.cart.length ? 19 : 0;\n    const cartVat = Math.round((cartNet+shipCost)*0.23);\n    const cartTotal = cartNet+shipCost+cartVat;\n\n    const variantBgs = ['#EAF3EF','#F3EFE6','#EBF0F3','#F1EEF4','#EFF3EA','#F3ECEC'];\n\n    return {\n      // nav / routing\n      isHome: s.screen==='home', isCategory: s.screen==='category', isConfig: s.screen==='config',\n      isCart: s.screen==='cart', isCheckout: s.screen==='checkout', isAccount: s.screen==='account',\n      goHome: ()=>this.setState({screen:'home'}),\n      goCart: ()=>this.setState({screen:'cart'}),\n      goCheckout: ()=>this.setState({screen:'checkout', orderDone:false}),\n      goAccount: ()=>this.setState({screen:'account'}),\n      goConfigCurrent: ()=>this.setState({screen:'config'}),\n      scrollProducts: ()=>{ const el=this.productsEl; if(el) window.scrollTo({top:el.getBoundingClientRect().top+window.scrollY-80,behavior:'smooth'}); },\n      productsRef: this.refProducts,\n      heroCanvas: this.refHeroCanvas,\n      sceneRef: this.refScene,\n      cardLayerRef: this.refCardLayer,\n      enterOpacity: s.entered ? 1 : 0,\n      enterTransform: s.entered ? 'translate(-50%,-50%)' : 'translate(-50%,-50%) translateY(28px) scale(.9)',\n      showName: ['Wizytówki · 500 szt.','Roll-up 200×85 cm','Ulotki A5 · 2500 szt.','Naklejki cięte na kształt'][s.showIdx],\n      isShowCard: s.showIdx===0, isShowRoll: s.showIdx===1, isShowFlyer: s.showIdx===2, isShowSticker: s.showIdx===3,\n      showDots: [0,1,2,3].map(i=>({bg:i===s.showIdx?'#E7A33C':'rgba(255,255,255,.45)'})),\n\n      cartHasItems: s.cart.length>0,\n      cartEmpty: s.cart.length===0,\n      cartCount: s.cart.length,\n\n      // home cats\n      cats: [\n        {key:'wiz', name:'Wizytówki', tag:'Standard, składane, premium', icon:this.ic('card'), span:2},\n        {key:'ulot', name:'Ulotki i foldery', tag:'A6–A4, składane', icon:this.ic('flyer'), span:1},\n        {key:'plak', name:'Plakaty', tag:'B2–B0, wnętrza', icon:this.ic('poster'), span:1},\n        {key:'baner', name:'Banery i roll-upy', tag:'Reklama wielkoformatowa', icon:this.ic('banner'), span:2},\n        {key:'nakl', name:'Naklejki', tag:'Etykiety, arkusze, role', icon:this.ic('sticker'), span:1},\n        {key:'piecz', name:'Pieczątki', tag:'Automaty Trodat', icon:this.ic('stamp'), span:1},\n        {key:'gadz', name:'Materiały reklamowe', tag:'Kubki, długopisy, torby', icon:this.ic('gift')
